<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Black Sheep Radio</title>

<style>

body{
    background:#111;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
}

img{
    width:250px;
    height:250px;
    object-fit:cover;
    border-radius:12px;
}

.song{
    font-size:24px;
    font-weight:bold;
    margin-top:15px;
}

.artist{
    font-size:18px;
    color:#ccc;
}

.dj{
    margin-top:10px;
    color:#ff0033;
}

audio{
    width:100%;
    margin-top:20px;
}

</style>
</head>
<body>

<div class="container">

    <h1>🐑 Black Sheep Radio</h1>

    <img
        id="cover"
        src="https://i.imgur.com/tdsxn4c.png"
    >

    <div class="song" id="song">
        Loading...
    </div>

    <div class="artist" id="artist">
    </div>

    <div class="dj" id="dj">
    </div>

    <audio controls autoplay>
        <source src="https://streaming.live365.com/a97529">
    </audio>

</div>

<script>

async function updateNowPlaying(){

    try{

        const response =
            await fetch("/api/nowplaying");

        const data =
            await response.json();

        document.getElementById("song")
            .innerText = data.title;

        document.getElementById("artist")
            .innerText = data.artist;

        document.getElementById("dj")
            .innerText =
                data.dj
                ? "🎙 " + data.dj
                : "No DJ Live";

        document.getElementById("cover")
            .src = data.album_art;

    }
    catch(error){

        console.log(error);

    }
}

updateNowPlaying();

setInterval(
    updateNowPlaying,
    15000
);

</script>

</body>
</html>
