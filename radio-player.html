<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Black Sheep Radio</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #ff0033;
    --red-dim: #cc0028;
    --dark: #0a0a0b;
    --surface: #111114;
    --surface2: #18181c;
    --surface3: #212126;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text-muted: #888;
    --text-dim: #555;
  }

  html, body {
    height: 100%;
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
    overflow-x: hidden;
  }

  /* ─── SCANLINE OVERLAY ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.18) 2px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* ─── ANIMATED BG PULSE ─── */
  .bg-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .bg-glow::after {
    content: '';
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,0,51,0.12) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: pulse-bg 4s ease-in-out infinite;
  }
  @keyframes pulse-bg {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.15); }
  }

  /* ─── LAYOUT ─── */
  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    gap: 0;
  }

  /* ─── HEADER ─── */
  .station-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 0.5rem;
  }

  .station-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(2.8rem, 8vw, 5rem);
    line-height: 0.92;
    text-transform: uppercase;
    letter-spacing: -0.01em;
    color: var(--text);
    margin-bottom: 2.5rem;
    text-align: center;
  }
  .station-name span { color: var(--red); }

  /* ─── ALBUM ART ─── */
  .art-wrap {
    position: relative;
    width: clamp(200px, 40vw, 280px);
    aspect-ratio: 1;
    margin-bottom: 2rem;
  }

  .art-ring {
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,0,51,0.3);
    animation: spin-ring 12s linear infinite;
  }
  .art-ring::before {
    content: '';
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--red);
    top: -4px;
    left: 50%;
    transform: translateX(-50%);
  }
  @keyframes spin-ring {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .art-img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    background: var(--surface2);
    transition: opacity 0.5s;
  }
  .art-img.loading { opacity: 0.4; }

  .live-badge {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: var(--red);
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #fff;
    animation: blink 1.2s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  /* ─── NOW PLAYING ─── */
  .now-playing {
    text-align: center;
    max-width: 420px;
    margin-bottom: 2rem;
  }

  .np-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.4rem;
  }

  .np-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: clamp(1.5rem, 5vw, 2.2rem);
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 0.3rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .np-artist {
    font-size: 14px;
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ─── WAVEFORM VIZ ─── */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 32px;
    margin-bottom: 2rem;
  }
  .wave-bar {
    width: 3px;
    border-radius: 2px;
    background: var(--red);
    opacity: 0.7;
    animation: wave-bounce var(--d, 0.8s) ease-in-out infinite alternate;
  }
  @keyframes wave-bounce {
    from { transform: scaleY(0.2); }
    to { transform: scaleY(1); }
  }

  /* ─── PLAYER CONTROLS ─── */
  .player-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem 2rem;
    width: 100%;
    max-width: 420px;
    margin-bottom: 1.5rem;
  }

  .play-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.25rem;
    margin-bottom: 1.25rem;
  }

  .btn-play {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    background: var(--red);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s, background 0.15s;
    flex-shrink: 0;
  }
  .btn-play:hover { background: var(--red-dim); }
  .btn-play:active { transform: scale(0.95); }

  .btn-play svg {
    width: 28px;
    height: 28px;
    fill: #fff;
    margin-left: 3px;
  }
  .btn-play.paused svg { margin-left: 0; }

  .volume-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .volume-icon {
    color: var(--text-dim);
    font-size: 14px;
    flex-shrink: 0;
    width: 14px;
    text-align: center;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 3px;
    background: var(--surface3);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--red);
    cursor: pointer;
    transition: transform 0.1s;
  }
  input[type=range]:hover::-webkit-slider-thumb { transform: scale(1.2); }

  .vol-val {
    font-size: 12px;
    color: var(--text-muted);
    width: 28px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* ─── DJ STRIP ─── */
  .dj-strip {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    max-width: 420px;
    width: 100%;
    margin-bottom: 1.5rem;
  }
  .dj-avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--red);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: #fff;
    flex-shrink: 0;
  }
  .dj-info { flex: 1; min-width: 0; }
  .dj-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); }
  .dj-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .dj-strip.offline .dj-name { color: var(--text-dim); font-style: italic; }

  /* ─── REQUESTS ─── */
  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 0.75rem;
    max-width: 420px;
    width: 100%;
  }

  .requests-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 420px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .request-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .request-item:last-child { border-bottom: none; }
  .request-item:hover { background: var(--surface2); }

  .req-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--red);
    width: 20px;
    flex-shrink: 0;
  }
  .req-info { flex: 1; min-width: 0; }
  .req-song {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }
  .req-meta {
    font-size: 12px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .req-source {
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    flex-shrink: 0;
  }

  .empty-requests {
    padding: 24px 16px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
  }

  /* ─── REQUEST FORM ─── */
  .req-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    width: 100%;
    max-width: 420px;
    margin-bottom: 1.5rem;
  }

  .req-form-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text);
    margin-bottom: 1rem;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }

  .form-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input::placeholder { color: var(--text-dim); }
  .form-input:focus { border-color: rgba(255,0,51,0.5); }
  .form-input.full { grid-column: span 2; }

  .btn-submit {
    width: 100%;
    padding: 12px;
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-submit:hover { background: var(--red-dim); }
  .btn-submit:active { transform: scale(0.99); }

  .form-msg {
    font-size: 12px;
    margin-top: 8px;
    text-align: center;
    min-height: 18px;
    color: #4caf50;
  }
  .form-msg.err { color: #ff6b6b; }

  /* ─── FOOTER ─── */
  .footer {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-align: center;
    margin-top: 1rem;
  }

  /* ─── MOBILE ─── */
  @media (max-width: 480px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-input.full { grid-column: span 1; }
    .player-card { padding: 1.25rem 1.25rem; }
  }
</style>
</head>
<body>
<div class="bg-glow"></div>

<div class="page">
  <div class="station-tag">Live Streaming Radio</div>
  <h1 class="station-name">Black <span>Sheep</span> Radio</h1>

  <a href="/schedule" style="
    display: inline-block;
    margin-bottom: 2rem;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    padding: 8px 18px;
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: color 0.15s, border-color 0.15s;
  " onmouseover="this.style.color='#f0f0f0';this.style.borderColor='rgba(255,255,255,0.14)'"
     onmouseout="this.style.color='#888';this.style.borderColor='rgba(255,255,255,0.08)'">
    📅 DJ Schedule
  </a>

  <!-- Album art -->
  <div class="art-wrap">
    <div class="art-ring"></div>
    <img class="art-img" id="artImg" src="https://i.imgur.com/tdsxn4c.png" alt="Album art">
    <div class="live-badge"><div class="live-dot"></div>Live</div>
  </div>

  <!-- Now playing -->
  <div class="now-playing">
    <div class="np-label">Now playing</div>
    <div class="np-title" id="npTitle">Loading…</div>
    <div class="np-artist" id="npArtist">—</div>
  </div>

  <!-- Waveform -->
  <div class="waveform" id="waveform" style="display:none;"></div>

  <!-- Player -->
  <div class="player-card">
    <div class="play-row">
      <button class="btn-play paused" id="playBtn" aria-label="Play / Pause">
        <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
    </div>
    <div class="volume-row">
      <span class="volume-icon">🔈</span>
      <input type="range" id="volSlider" min="0" max="100" value="80" step="1" aria-label="Volume">
      <span class="vol-val" id="volVal">80</span>
    </div>
  </div>

  <!-- DJ strip -->
  <div class="dj-strip offline" id="djStrip">
    <div class="dj-avatar" id="djAvatar">?</div>
    <div class="dj-info">
      <div class="dj-label">On The Decks</div>
      <div class="dj-name" id="djName">No DJ online</div>
    </div>
    <div class="live-badge" id="djLiveBadge" style="display:none;"><div class="live-dot"></div>DJ</div>
  </div>

  <!-- Requests list -->
  <div class="section-label">Live Requests</div>
  <div class="requests-box" id="requestsBox">
    <div class="empty-requests" id="reqEmpty">No requests yet 🎵</div>
  </div>

  <!-- Request form -->
  <div class="req-form">
    <div class="req-form-title">🎵 Request a Song</div>
    <div class="form-grid">
      <input class="form-input" id="fSong" type="text" placeholder="Song title" required>
      <input class="form-input" id="fArtist" type="text" placeholder="Artist" required>
      <input class="form-input full" id="fUser" type="text" placeholder="Your name">
      <input class="form-input full" id="fServer" type="text" placeholder="Discord server (optional)">
    </div>
    <button class="btn-submit" id="submitBtn">Send Request</button>
    <div class="form-msg" id="formMsg"></div>
  </div>

  <div class="footer">© Black Sheep Radio · Live365 Stream</div>
</div>

<audio id="radioAudio" preload="none">
  <source src="https://streaming.live365.com/a97529" type="audio/mpeg">
</audio>

<script>
const STREAM_URL = "https://streaming.live365.com/a97529";
const REQUEST_URL = "https://worker-production-fc98.up.railway.app/request";
const BANNER = "https://i.imgur.com/tdsxn4c.png";

const audio = document.getElementById("radioAudio");
const playBtn = document.getElementById("playBtn");
const playIcon = document.getElementById("playIcon");
const volSlider = document.getElementById("volSlider");
const volVal = document.getElementById("volVal");
const npTitle = document.getElementById("npTitle");
const npArtist = document.getElementById("npArtist");
const artImg = document.getElementById("artImg");
const djName = document.getElementById("djName");
const djAvatar = document.getElementById("djAvatar");
const djStrip = document.getElementById("djStrip");
const djLiveBadge = document.getElementById("djLiveBadge");
const requestsBox = document.getElementById("requestsBox");
const reqEmpty = document.getElementById("reqEmpty");
const waveform = document.getElementById("waveform");
const submitBtn = document.getElementById("submitBtn");
const formMsg = document.getElementById("formMsg");

// ─── WAVEFORM BUILD ───
const NUM_BARS = 20;
for (let i = 0; i < NUM_BARS; i++) {
  const b = document.createElement("div");
  b.className = "wave-bar";
  const h = 8 + Math.random() * 24;
  b.style.height = h + "px";
  b.style.setProperty("--d", (0.5 + Math.random() * 0.8).toFixed(2) + "s");
  b.style.animationDelay = (Math.random() * 0.5).toFixed(2) + "s";
  b.style.opacity = (0.4 + Math.random() * 0.6).toFixed(2);
  waveform.appendChild(b);
}

// ─── AUDIO PLAYER ───
let playing = false;
audio.volume = 0.8;

function setPlayIcon(isPlaying) {
  if (isPlaying) {
    playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    playBtn.classList.remove("paused");
    waveform.style.display = "flex";
  } else {
    playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    playBtn.classList.add("paused");
    waveform.style.display = "none";
  }
}

playBtn.addEventListener("click", () => {
  if (!playing) {
    audio.src = STREAM_URL + "?t=" + Date.now();
    audio.load();
    audio.play().then(() => {
      playing = true;
      setPlayIcon(true);
    }).catch(() => {
      playing = false;
      setPlayIcon(false);
    });
  } else {
    audio.pause();
    audio.src = "";
    playing = false;
    setPlayIcon(false);
  }
});

volSlider.addEventListener("input", () => {
  const v = parseInt(volSlider.value);
  audio.volume = v / 100;
  volVal.textContent = v;
});

// ─── REQUEST FORM ───
submitBtn.addEventListener("click", async () => {
  const song = document.getElementById("fSong").value.trim();
  const artist = document.getElementById("fArtist").value.trim();
  const user = document.getElementById("fUser").value.trim() || "Web Listener";
  const server = document.getElementById("fServer").value.trim() || "Website";

  if (!song || !artist) {
    showMsg("Please fill in song and artist.", true);
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = "Sending…";

  try {
    const fd = new FormData();
    fd.append("song", song);
    fd.append("artist", artist);
    fd.append("user", user);
    fd.append("server", server);

    const res = await fetch(REQUEST_URL, { method: "POST", body: fd });
    if (res.ok) {
      showMsg("✅ Request sent!");
      document.getElementById("fSong").value = "";
      document.getElementById("fArtist").value = "";
    } else {
      showMsg("Requests are currently disabled.", true);
    }
  } catch (e) {
    showMsg("Could not send request. Try again.", true);
  }

  submitBtn.disabled = false;
  submitBtn.textContent = "Send Request";
});

function showMsg(msg, err) {
  formMsg.textContent = msg;
  formMsg.className = "form-msg" + (err ? " err" : "");
  setTimeout(() => { formMsg.textContent = ""; formMsg.className = "form-msg"; }, 4000);
}

// ─── POLL STATUS FROM YOUR BOT ───
// Since your Flask backend doesn't expose a JSON status endpoint,
// we poll what we can. The code below is ready to consume a /status endpoint
// if you add one (see README in this file).
// For now we show a placeholder that updates when you add the endpoint.

function renderRequests(requests) {
  requestsBox.innerHTML = "";
  if (!requests || requests.length === 0) {
    requestsBox.innerHTML = '<div class="empty-requests">No requests yet 🎵</div>';
    return;
  }
  requests.forEach((r, i) => {
    const item = document.createElement("div");
    item.className = "request-item";
    item.innerHTML = `
      <div class="req-num">${i + 1}</div>
      <div class="req-info">
        <div class="req-song">${esc(r.song)}</div>
        <div class="req-meta">${esc(r.artist)} · by ${esc(r.user)}</div>
      </div>
      <div class="req-source">${esc(r.source || "web")}</div>
    `;
    requestsBox.appendChild(item);
  });
}

function renderDJ(dj) {
  if (dj) {
    djName.textContent = dj;
    djAvatar.textContent = dj.charAt(0).toUpperCase();
    djStrip.classList.remove("offline");
    djLiveBadge.style.display = "flex";
  } else {
    djName.textContent = "No DJ online";
    djAvatar.textContent = "?";
    djStrip.classList.add("offline");
    djLiveBadge.style.display = "none";
  }
}

function renderNowPlaying(artist, title, albumArt) {
  if (title && title !== "Unknown") {
    npTitle.textContent = title;
    npArtist.textContent = artist && artist !== "Unknown" ? artist : "Unknown Artist";
  } else {
    npTitle.textContent = "Live Stream";
    npArtist.textContent = "Black Sheep Radio";
  }
  if (albumArt) {
    artImg.src = albumArt;
  }
}

function esc(str) {
  if (!str) return "";
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

async function pollStatus() {
  try {
    const res = await fetch("https://worker-production-fc98.up.railway.app/status");
    if (res.ok) {
      const data = await res.json();
      renderDJ(data.dj);
      renderNowPlaying(data.artist, data.title, data.album_art);
      renderRequests(data.requests || []);
    }
  } catch (_) {}
}
